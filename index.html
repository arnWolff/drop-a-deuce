<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#3d2817" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="description" content="The fun way to map your #2 around the world." />
<title>Drop a Deuce 🍑 — The fun way to map your #2</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" crossorigin="anonymous" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" crossorigin="anonymous"></script>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #faf3e7;
    --cream: #fff8ec;
    --brown-1: #3d2817;
    --brown-2: #6b4423;
    --brown-3: #8b5a3c;
    --gold: #f4c430;
    --gold-deep: #e0a800;
    --pink: #ffb4a2;
    --green: #7cb342;
    --blue: #2196f3;
    --shadow: 0 8px 24px rgba(61,40,23,0.18);
    --shadow-lg: 0 16px 40px rgba(61,40,23,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg); color: var(--brown-1); overscroll-behavior: none; }

  /* ===== TOP BAR ===== */
  .topbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 10px 14px;
    display: flex; align-items: center; gap: 8px;
    background: linear-gradient(180deg, rgba(250,243,231,0.96) 70%, rgba(250,243,231,0));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  .logo { font-family: 'Bagel Fat One', cursive; font-size: 22px; color: var(--brown-1); display: flex; align-items: center; gap: 5px; letter-spacing: -0.3px; }
  .logo .blob { display: inline-block; animation: wobble 3s ease-in-out infinite; }
  @keyframes wobble { 0%,100% { transform: rotate(-8deg); } 50% { transform: rotate(8deg) translateY(-2px); } }
  .spacer { flex: 1; }
  .pill { background: var(--cream); border: 2px solid var(--brown-1); border-radius: 999px; padding: 6px 11px;
    font-weight: 700; font-size: 12px; cursor: pointer; box-shadow: 2px 2px 0 var(--brown-1);
    transition: transform .12s, box-shadow .12s; user-select: none; white-space: nowrap; }
  .pill:active { transform: translate(2px,2px); box-shadow: 0 0 0 var(--brown-1); }
  .pill.premium { background: linear-gradient(135deg, var(--gold), var(--gold-deep)); }

  /* ===== GLOBAL COUNTER BANNER ===== */
  .ticker { position: fixed; top: 50px; left: 0; right: 0; z-index: 999;
    background: var(--brown-1); color: var(--cream);
    padding: 8px 14px; border-bottom: 2px solid var(--brown-2);
    box-shadow: 0 4px 14px rgba(61,40,23,0.25);
    transform: translateY(-100%); animation: ticker-in 0.6s 0.2s cubic-bezier(0.34, 1.4, 0.64, 1) forwards; }
  @keyframes ticker-in { to { transform: translateY(0); } }
  .ticker-row { display: flex; align-items: center; justify-content: center; gap: 18px; flex-wrap: wrap; }
  .ticker-stat { display: flex; align-items: center; gap: 7px; font-weight: 700; font-size: 13px; }
  .ticker-stat .em { font-size: 18px; }
  .ticker-stat .num {
    font-family: 'Bagel Fat One', cursive;
    font-size: clamp(16px, 4.5vw, 22px);
    color: var(--gold);
    letter-spacing: 0.5px;
    transition: transform 0.15s, color 0.15s;
    min-width: 70px;
    display: inline-block;
  }
  .ticker-stat .num.flash { transform: scale(1.15); color: #fff; }
  .ticker-stat .lbl { opacity: 0.75; font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 800; }
  .ticker-fact { font-size: 10px; text-align: center; margin-top: 3px; opacity: 0.65;
    font-style: italic; font-weight: 500; min-height: 14px; }

  /* ===== MAP ===== */
  #map { position: fixed; inset: 0; z-index: 1; }
  .leaflet-container { background: var(--cream); font-family: inherit; }
  .leaflet-popup-content-wrapper { border-radius: 16px; border: 2px solid var(--brown-1); box-shadow: var(--shadow); background: var(--cream); padding: 0; overflow: hidden; }
  .leaflet-popup-content { margin: 0; min-width: 200px; }
  .leaflet-popup-tip { background: var(--cream); border: 2px solid var(--brown-1); }
  .leaflet-control-attribution { font-size: 10px; opacity: 0.7; }
  .leaflet-control-zoom { border: 2px solid var(--brown-1) !important; border-radius: 12px !important; overflow: hidden; box-shadow: 2px 2px 0 var(--brown-1); margin-bottom: 110px !important; }
  .leaflet-control-zoom a { background: var(--cream) !important; color: var(--brown-1) !important; font-weight: 700; }

  /* User location pulse */
  .user-loc { width: 24px; height: 24px; }
  .user-loc-inner { width: 16px; height: 16px; background: var(--blue); border: 3px solid white;
    border-radius: 50%; box-shadow: 0 0 0 2px rgba(33,150,243,0.4), 0 2px 6px rgba(0,0,0,0.3); position: relative; }
  .user-loc-inner::before { content: ''; position: absolute; inset: -8px; border-radius: 50%;
    background: var(--blue); opacity: 0.3; animation: loc-pulse 2s ease-out infinite; }
  @keyframes loc-pulse { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(2.5); opacity: 0; } }

  /* Pin marker */
  .poo-marker { font-size: 32px; text-align: center; line-height: 1;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.3));
    animation: drop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; position: relative; }
  .poo-marker.me { animation: drop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), pulse 2s ease-in-out 0.5s infinite; }
  .poo-marker .badge { position: absolute; top: -6px; right: -10px; font-size: 16px;
    background: var(--gold); border: 2px solid var(--brown-1); border-radius: 50%; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center; line-height: 1; }
  @keyframes drop { 0% { transform: translateY(-30px) scale(0.5); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

  .popup-card { width: 200px; }
  .popup-photo { width: 100%; height: 130px; object-fit: cover; display: block; background: var(--brown-3); }
  .popup-body { padding: 10px 12px; }
  .popup-title { font-weight: 800; font-size: 13px; display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
  .popup-meta { font-size: 11px; color: var(--brown-2); opacity: 0.8; }

  /* ===== MY STATS CARD ===== */
  .stats { position: fixed; top: 110px; left: 14px; z-index: 998; background: var(--cream);
    border: 2px solid var(--brown-1); border-radius: 14px; padding: 8px 12px;
    box-shadow: 3px 3px 0 var(--brown-1); font-weight: 700; line-height: 1.3; }
  .stats-row { display: flex; gap: 14px; align-items: center; }
  .stats-item { text-align: center; }
  .stats .num { font-family: 'Bagel Fat One', cursive; font-size: 18px; color: var(--brown-2); display: block; }
  .stats .lbl { font-size: 9px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.4px; }
  .stats .lvl { background: var(--gold); padding: 2px 6px; border-radius: 6px; font-size: 10px; }
  .stats .me-tag { font-size: 9px; font-weight: 800; opacity: 0.6; text-transform: uppercase;
    letter-spacing: 0.6px; margin-bottom: 2px; display: block; }

  /* ===== FLOATING BUTTONS ===== */
  .locate-fab { position: fixed; right: 14px; top: 110px; z-index: 998;
    background: var(--cream); border: 2px solid var(--brown-1); border-radius: 50%;
    width: 44px; height: 44px; font-size: 20px; cursor: pointer;
    box-shadow: 3px 3px 0 var(--brown-1); display: flex; align-items: center; justify-content: center;
    transition: transform .1s, box-shadow .1s; }
  .locate-fab:active { transform: translate(3px,3px); box-shadow: 0 0 0 var(--brown-1); }
  .locate-fab.locating { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .challenge-fab { position: fixed; left: 14px; bottom: 28px; z-index: 999;
    background: var(--cream); border: 2px solid var(--brown-1); border-radius: 50%;
    width: 54px; height: 54px; font-size: 24px; cursor: pointer;
    box-shadow: 3px 3px 0 var(--brown-1); display: flex; align-items: center; justify-content: center;
    position: relative; transition: transform .1s, box-shadow .1s; }
  .challenge-fab:active { transform: translate(3px,3px); box-shadow: 0 0 0 var(--brown-1); }
  .challenge-fab .count { position: absolute; top: -4px; right: -4px; background: var(--brown-1); color: var(--cream);
    font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 999px; border: 2px solid var(--cream); }

  /* ===== MAIN BUTTON ===== */
  .fab-wrap { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 999;
    display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .fab-label { background: var(--brown-1); color: var(--cream); padding: 4px 12px; border-radius: 999px;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.9; }
  .fab { width: 92px; height: 92px; border-radius: 50%; border: 4px solid var(--brown-1);
    background: radial-gradient(circle at 30% 30%, var(--gold) 0%, var(--gold-deep) 100%);
    color: var(--brown-1); font-size: 42px; cursor: pointer;
    box-shadow: 0 6px 0 var(--brown-1), var(--shadow-lg); transition: transform 0.1s, box-shadow 0.1s;
    display: flex; align-items: center; justify-content: center; position: relative; }
  .fab::before { content: ''; position: absolute; inset: -8px; border-radius: 50%; background: var(--gold);
    opacity: 0.3; animation: ripple 2s ease-out infinite; z-index: -1; }
  @keyframes ripple { 0% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(1.4); opacity: 0; } }
  .fab:active { transform: translateY(6px); box-shadow: 0 0 0 var(--brown-1), var(--shadow); }

  /* CONFETTI / TOAST */
  .confetti { position: fixed; pointer-events: none; z-index: 9999; font-size: 28px; animation: confetti-fall 1.4s ease-out forwards; }
  @keyframes confetti-fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(160px) rotate(540deg); opacity: 0; } }

  .toast { position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%);
    background: var(--brown-1); color: var(--cream); padding: 10px 18px; border-radius: 999px;
    font-weight: 700; font-size: 13px; z-index: 9998; box-shadow: var(--shadow);
    animation: toast-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), toast-out 0.3s ease-in 1.9s forwards;
    white-space: nowrap; max-width: 90vw; }
  .toast.warn { background: var(--pink); color: var(--brown-1); }
  .toast.win { background: var(--green); color: white; }
  @keyframes toast-in { from { transform: translate(-50%, 30px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
  @keyframes toast-out { to { transform: translate(-50%, 30px); opacity: 0; } }

  /* BOTTOM SHEET */
  .sheet-bg { position: fixed; inset: 0; background: rgba(61,40,23,0.5); backdrop-filter: blur(4px);
    z-index: 9000; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .sheet-bg.open { opacity: 1; pointer-events: auto; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; background: var(--cream);
    border-radius: 24px 24px 0 0; border-top: 3px solid var(--brown-1);
    transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
    z-index: 9100; max-height: 85vh; overflow-y: auto; padding: 8px 18px 24px; }
  .sheet.open { transform: translateY(0); }
  .sheet-handle { width: 44px; height: 5px; background: var(--brown-3); opacity: 0.4;
    border-radius: 999px; margin: 6px auto 14px; }
  .sheet h2 { font-family: 'Bagel Fat One', cursive; font-size: 26px; margin-bottom: 4px; }
  .sheet .sub { font-size: 13px; color: var(--brown-2); opacity: 0.85; margin-bottom: 16px; }

  .ch-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .ch-card { background: var(--bg); border: 2px solid var(--brown-1); border-radius: 14px;
    padding: 10px 6px; text-align: center; cursor: pointer; transition: transform .15s, background .15s;
    position: relative; overflow: hidden; }
  .ch-card:active { transform: scale(0.95); }
  .ch-card.selected { background: var(--gold); transform: scale(1.05); }
  .ch-card.locked { opacity: 0.45; cursor: not-allowed; }
  .ch-card.done::after { content: '✓'; position: absolute; top: 4px; right: 6px;
    background: var(--green); color: white; width: 18px; height: 18px; border-radius: 50%;
    font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
  .ch-card.locked::after { content: '🔒'; position: absolute; top: 4px; right: 4px; font-size: 12px; }
  .ch-emoji { font-size: 28px; line-height: 1; margin-bottom: 4px; display: block; }
  .ch-name { font-size: 10px; font-weight: 700; line-height: 1.15; }
  .ch-xp { font-size: 9px; color: var(--brown-2); margin-top: 2px; opacity: 0.8; }

  .photo-row { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
  .photo-btn { flex: 1; background: var(--cream); border: 2px dashed var(--brown-1); border-radius: 14px;
    padding: 18px; text-align: center; cursor: pointer; font-weight: 700; font-size: 13px;
    color: var(--brown-2); transition: background .15s; }
  .photo-btn:active { background: var(--bg); }
  .photo-preview { position: relative; width: 90px; height: 90px; border-radius: 14px;
    border: 2px solid var(--brown-1); overflow: hidden; box-shadow: 2px 2px 0 var(--brown-1); }
  .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
  .photo-preview .x { position: absolute; top: 2px; right: 2px; background: var(--brown-1);
    color: var(--cream); width: 22px; height: 22px; border-radius: 50%; font-size: 14px;
    font-weight: 800; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }
  #fileInput { display: none; }

  .cta { width: 100%; padding: 14px; border: 3px solid var(--brown-1); border-radius: 16px;
    background: linear-gradient(135deg, var(--gold), var(--gold-deep)); color: var(--brown-1);
    font-family: inherit; font-size: 16px; font-weight: 800; cursor: pointer;
    box-shadow: 4px 4px 0 var(--brown-1); transition: transform .1s, box-shadow .1s; }
  .cta:active { transform: translate(4px,4px); box-shadow: 0 0 0 var(--brown-1); }
  .cta:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; box-shadow: 4px 4px 0 var(--brown-1) !important; }

  .ch-panel-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .ch-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px;
    background: var(--bg); border: 2px solid var(--brown-1); border-radius: 14px; }
  .ch-row.done { background: linear-gradient(90deg, rgba(124,179,66,0.2), var(--bg)); }
  .ch-row.locked { opacity: 0.5; }
  .ch-row .em { font-size: 28px; }
  .ch-row .info { flex: 1; }
  .ch-row .nm { font-weight: 800; font-size: 14px; }
  .ch-row .ds { font-size: 11px; opacity: 0.75; }
  .ch-row .pt { font-family: 'Bagel Fat One', cursive; font-size: 16px; color: var(--gold-deep); }

  .xp-bar { background: var(--bg); border: 2px solid var(--brown-1); border-radius: 999px;
    padding: 4px; height: 26px; position: relative; margin-bottom: 14px; }
  .xp-fill { background: linear-gradient(90deg, var(--gold), var(--gold-deep)); height: 100%;
    border-radius: 999px; transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .xp-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; }

  .ach { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
    background: var(--cream); border: 4px solid var(--brown-1); border-radius: 24px;
    padding: 20px 28px; text-align: center; z-index: 10000;
    box-shadow: 6px 6px 0 var(--brown-1), var(--shadow-lg); pointer-events: none; }
  .ach.show { animation: ach-pop 2.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
  @keyframes ach-pop {
    0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); }
    15% { transform: translate(-50%, -50%) scale(1.1) rotate(5deg); }
    25% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    85% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(0.7) rotate(0deg); opacity: 0; }
  }
  .ach .em { font-size: 56px; line-height: 1; margin-bottom: 6px; display: block; }
  .ach .ttl { font-family: 'Bagel Fat One', cursive; font-size: 20px; }
  .ach .nm { font-size: 14px; font-weight: 700; color: var(--brown-2); }

  @media (max-width: 380px) {
    .logo { font-size: 16px; }
    .pill { font-size: 11px; padding: 5px 8px; }
    .ticker-row { gap: 12px; }
    .ticker-stat .num { font-size: 16px; min-width: 60px; }
    .ticker-fact { font-size: 9px; }
    .stats { padding: 6px 10px; }
    .stats-row { gap: 10px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span class="blob">🍑</span><span data-i18n="appName">Drop a Deuce</span></div>
  <div class="spacer"></div>
  <div class="pill" id="langBtn">🇬🇧 EN</div>
  <div class="pill premium" id="planBtn">🆓 <span data-i18n="free">Free</span></div>
</div>

<!-- GLOBAL LIVE TICKER -->
<div class="ticker">
  <div class="ticker-row">
    <div class="ticker-stat">
      <span class="em">💩</span>
      <span class="num" id="globalTotal">0</span>
      <span class="lbl" data-i18n="worldwide">Worldwide</span>
    </div>
    <div class="ticker-stat">
      <span class="em">🔥</span>
      <span class="num" id="globalToday">0</span>
      <span class="lbl" data-i18n="todayLbl">Today</span>
    </div>
  </div>
  <div class="ticker-fact" id="funFact">—</div>
</div>

<!-- MY STATS -->
<div class="stats">
  <span class="me-tag" data-i18n="meTag">My stats</span>
  <div class="stats-row">
    <div class="stats-item"><span class="num" id="myToday">0</span><span class="lbl" data-i18n="today">Today</span></div>
    <div class="stats-item"><span class="num" id="myTotal">0</span><span class="lbl" data-i18n="total">Total</span></div>
    <div class="stats-item"><span class="num lvl" id="lvlNum">1</span><span class="lbl" data-i18n="level">Level</span></div>
  </div>
</div>

<button class="locate-fab" id="locateBtn" aria-label="Locate me" title="Center on my location">📍</button>

<div id="map"></div>

<button class="challenge-fab" id="trophyBtn" aria-label="Challenges">
  🏆<span class="count" id="challengeCount">0</span>
</button>

<div class="fab-wrap">
  <div class="fab-label" data-i18n="tap">Tap when it's time</div>
  <button class="fab" id="dropBtn">💩</button>
</div>

<div class="sheet-bg" id="sheetBg"></div>

<div class="sheet" id="dropSheet">
  <div class="sheet-handle"></div>
  <h2 data-i18n="dropTitle">Drop a Pin 💩</h2>
  <p class="sub" data-i18n="dropSub">Pick a challenge and snap a fun photo!</p>
  <div class="ch-grid" id="dropChGrid"></div>
  <div class="photo-row" id="photoRow">
    <label class="photo-btn" id="photoBtn" for="fileInput">
      📸 <span data-i18n="addPhoto">Add a photo (optional)</span>
    </label>
    <input type="file" id="fileInput" accept="image/*" capture="environment" />
  </div>
  <button class="cta" id="confirmDrop" disabled data-i18n="dropIt">Drop it! 💩</button>
</div>

<div class="sheet" id="chSheet">
  <div class="sheet-handle"></div>
  <h2>🏆 <span data-i18n="challenges">Challenges</span></h2>
  <p class="sub"><span id="chProgress">0/0</span> <span data-i18n="completed">completed</span></p>
  <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div>
    <div class="xp-text"><span id="xpText">0 / 100 XP</span></div></div>
  <div class="ch-panel-list" id="chPanelList"></div>
</div>

<div class="sheet" id="premiumSheet">
  <div class="sheet-handle"></div>
  <h2 data-i18n="goPremium">Go Premium ⭐</h2>
  <p class="sub" data-i18n="premiumDesc">Unlock the full experience!</p>
  <div class="ch-panel-list" id="perksList"></div>
  <button class="cta" id="upgradeBtn" data-i18n="upgrade">Upgrade Now</button>
</div>

<div class="ach" id="ach">
  <span class="em" id="achEmoji">🏆</span>
  <div class="ttl" data-i18n="achievement">Challenge Complete!</div>
  <div class="nm" id="achName">—</div>
</div>

<script>
/* ================================================================
 * DROP A DEUCE / POSE TA PÊCHE v1 — Live Ticker + Real Geolocation + Persistence
 * Static, no-backend POC ready for GitHub Pages.
 *
 * The "global counter" is computed deterministically from the
 * launch date + a fixed rate (poos/sec). It looks live, ticks
 * naturally, works offline, and can be swapped for a real API
 * later (e.g. CountAPI, your own /stats endpoint).
 * ================================================================ */

// ---------- CHALLENGES ----------

// ---------- STORAGE ----------
const STORAGE_KEY = 'deuce_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      pins: pins.filter(p => p.mine), // only persist mine; demo pins reseed
      xp, completed: [...completed], plan, lang
    }));
  } catch (e) { /* private browsing or quota */ }
}

// ---------- GLOBAL LIVE COUNTER ----------
// Deterministic ticker: base + (seconds since launch * rate).
// To swap for a real backend later, replace totalCount() / todayCount()
// with a fetch to your /api/stats endpoint.
const LAUNCH_TS = Date.parse('2024-01-01T00:00:00Z');
const BASE_OFFSET = 47832156; // funny base
const RATE = 5.3;             // pins per second across the app

function totalCount() {
  return BASE_OFFSET + Math.floor((Date.now() - LAUNCH_TS) / 1000 * RATE)
    + pins.filter(p => p.mine).length;
}
function todayGlobal() {
  const start = new Date(); start.setHours(0,0,0,0);
  return Math.floor((Date.now() - start.getTime()) / 1000 * RATE)
    + pins.filter(p => p.mine && p.ts >= start.getTime()).length;
}

let lastTotal = -1, lastToday = -1;
function tickCounter() {
  const tot = totalCount(), tod = todayGlobal();
  if (tot !== lastTotal) {
    const el = $('globalTotal');
    el.textContent = fmt(tot);
    if (lastTotal >= 0) flash(el);
    lastTotal = tot;
  }
  if (tod !== lastToday) {
    const el = $('globalToday');
    el.textContent = fmt(tod);
    if (lastToday >= 0) flash(el);
    lastToday = tod;
  }
}
function flash(el) {
  el.classList.add('flash');
  setTimeout(() => el.classList.remove('flash'), 150);
}
setInterval(tickCounter, 250);

// Rotating fun fact (computed live from the counter)
let factIdx = 0;
function rotateFunFact() {
  const facts = I18N[lang].facts;
  const tot = totalCount();
  // Realistic-ish derived numbers, tongue-in-cheek
  const avgKg = 0.13;          // ~130g per poo
  const totalKg = tot * avgKg;
  const tons = Math.round(todayGlobal() * avgKg / 1000);
  const pools = Math.floor(totalKg / 2500000);            // 2.5M kg ~ 2500m³ ~ Olympic pool
  const laps = (tot * 0.12 / 40075000).toFixed(1);        // 12cm avg, earth circ 40,075km
  // Real stat: avg poo lasts ~12 min -> ~0.83% of population is going at any moment
  const persec = fmt(Math.floor(8.1e9 * 0.0083));
  const now = persec;
  const kg = Math.round(avgKg * 365 * 10) / 10;           // ~47kg/yr
  let f = facts[factIdx % facts.length];
  f = f.replace('{pools}', fmt(pools)).replace('{laps}', laps)
       .replace('{persec}', persec).replace('{now}', now)
       .replace('{kg}', kg).replace('{tons}', fmt(tons || 1));
  $('funFact').textContent = f;
  factIdx++;
}
setInterval(rotateFunFact, 5000);

function setUserLocation(lat, lng, zoom = 15, fly = true) {
  userLatLng = [lat, lng];
  if (!userMarker) {
    const icon = L.divIcon({
      className: '',
      html: '<div class="user-loc"><div class="user-loc-inner"></div></div>',
      iconSize: [24, 24], iconAnchor: [12, 12]
    });
    userMarker = L.marker([lat, lng], { icon, zIndexOffset: 1000, interactive: false }).addTo(map);
  } else {
    userMarker.setLatLng([lat, lng]);
  }
  if (fly) map.flyTo([lat, lng], zoom, { duration: 0.9 });
}

function locateUser(silent = false) {
  if (!navigator.geolocation) {
    if (!silent) toast(t('locationDenied'), 'warn');
    return Promise.reject('no-geo');
  }
  $('locateBtn').classList.add('locating');
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(
      pos => {
        $('locateBtn').classList.remove('locating');
        setUserLocation(pos.coords.latitude, pos.coords.longitude);
        if (!silent) toast(t('foundYou'), 'win');
        resolve([pos.coords.latitude, pos.coords.longitude]);
      },
      err => {
        $('locateBtn').classList.remove('locating');
        if (!silent) toast(t('locationDenied'), 'warn');
        reject(err);
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
    );
  });
}

$('locateBtn').addEventListener('click', () => locateUser(false));

    className: '',

function popupHtml(pin) {
  const ch = CHALLENGES.find(c => c.id === pin.challengeId);
  const time = new Date(pin.ts).toLocaleTimeString(lang === 'fr' ? 'fr-FR' : 'en-US',
    { hour: '2-digit', minute: '2-digit' });
  return `<div class="popup-card">
    ${pin.photo ? `<img class="popup-photo" src="${pin.photo}" alt="" />` : ''}
    <div class="popup-body">
      <div class="popup-title">${ch ? ch.em : '💩'} ${pin.mine ? '👉 ' + t('yourPin') : t('anonPin')}</div>
      <div class="popup-meta">${ch ? chName(ch) + ' · ' : ''}${time}</div>

function addPin(pin, openPopup = false) {
  pins.push(pin);

  m.bindPopup(popupHtml(pin));
  markersByPin.set(pin, m);
  if (openPopup) m.openPopup();
  updateMyStats();
  return m;
}

      mine: false, challengeId: cid, photo: null });

// ---------- PHOTO ----------
function compressImage(file, maxW = 900) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const r = Math.min(maxW / img.width, maxW / img.height, 1);
      canvas.width = img.width * r; canvas.height = img.height * r;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', 0.7));
      URL.revokeObjectURL(img.src);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}
$('fileInput').addEventListener('change', async e => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  pendingPhoto = await compressImage(file);
  $('photoBtn').innerHTML = `<div class="photo-preview">
    <img src="${pendingPhoto}" /><button class="x" id="rmPhoto">×</button></div>`;
  $('rmPhoto').addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    pendingPhoto = null;
    $('fileInput').value = '';
    $('photoBtn').innerHTML = '📸 <span>' + t('addPhoto') + '</span>';
  });
});

// ---------- DROP FLOW ----------
$('dropBtn').addEventListener('click', () => {
  if (plan === 'free' && todayMineCount() >= FREE_DAILY_LIMIT) {
    toast(t('dailyLimit'), 'warn');
    setTimeout(() => openSheet('premiumSheet'), 600);
    return;
  }
  pendingChallenge = null; pendingPhoto = null;
  $('fileInput').value = '';
  renderChallengeGrid();
  openSheet('dropSheet');
});

function commitDrop(lat, lng, challenge, photo) {
  const pin = { lat, lng, ts: Date.now(), mine: true, challengeId: challenge.id, photo };
  addPin(pin, true);
  map.flyTo([lat, lng], 16, { duration: 0.8 });
  confetti();
  const oldLevel = level();
  xp += challenge.xp;
  const isFirst = !completed.has(challenge.id);
  completed.add(challenge.id);
  updateMyStats();
  // Bump global counter immediately for fun feedback
  lastTotal = -1; lastToday = -1; tickCounter();
  flash($('globalTotal')); flash($('globalToday'));
  saveState();
  setTimeout(() => toast(t('dropped').replace('{xp}', challenge.xp), 'win'), 250);
  if (isFirst) setTimeout(() => showAchievement(challenge), 700);
  if (level() > oldLevel) setTimeout(() => toast(t('levelUp') + ' LVL ' + level(), 'win'), 1800);
}

$('confirmDrop').addEventListener('click', () => {
  if (!pendingChallenge) { toast(t('pickChallenge'), 'warn'); return; }
  const challenge = CHALLENGES.find(c => c.id === pendingChallenge);
  const photo = pendingPhoto;
  closeSheets();
  toast(t('locating'));

  if (!navigator.geolocation) {
    toast(t('locationDenied'), 'warn');
    enableTapToDrop(challenge, photo);
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => commitDrop(pos.coords.latitude, pos.coords.longitude, challenge, photo),
    () => {
      toast(t('locationDenied'), 'warn');
      enableTapToDrop(challenge, photo);
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
});

let tapMode = false;
function enableTapToDrop(challenge, photo) {
  if (tapMode) return; tapMode = true;
  map.once('click', e => {
    commitDrop(e.latlng.lat, e.latlng.lng, challenge, photo);
    tapMode = false;
  });
}

  lang = lang === 'en' ? 'fr' : 'en';
  applyLang();
  // Re-render existing popups in new language
  pins.forEach(pin => { const m = markersByPin.get(pin); if (m) m.setPopupContent(popupHtml(pin)); });
  saveState();
});
$('planBtn').addEventListener('click', () => {
  if (plan === 'free') openSheet('premiumSheet');
  else { plan = 'free'; applyLang(); toast(t('nowFree')); saveState(); }
});
$('upgradeBtn').addEventListener('click', () => {
  plan = 'premium'; applyLang(); closeSheets(); confetti(); toast(t('nowPremium'), 'win'); saveState();
});
$('trophyBtn').addEventListener('click', () => { renderChallengePanel(); openSheet('chSheet'); });

// ---------- INIT ----------
applyLang();
updateMyStats();
tickCounter();
rotateFunFact();

(async function init() {
  try {
    const [lat, lng] = await locateUser(true);
    if (pins.filter(p => !p.mine).length === 0) seedDemoPins([lat, lng]);
    setTimeout(() => toast(t('foundYou'), 'win'), 400);
  } catch {
    if (pins.filter(p => !p.mine).length === 0) seedDemoPins([48.8566, 2.3522]);
    setTimeout(() => toast(t('locationDenied'), 'warn'), 400);
  }
  setTimeout(() => { if (pins.filter(p => p.mine).length === 0) toast(t('welcome')); }, 2200);
})();
</script>
